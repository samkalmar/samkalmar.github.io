<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S. Kalmar | Poetry Bot</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Chat page layout ─────────────────────────────── */
    .chat-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: var(--space-lg) var(--space-md) var(--space-xl);
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .chat-header {
      text-align: center;
    }

    .chat-header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 0.4em;
    }

    .chat-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Message window ───────────────────────────────── */
    .chat-window {
      background: rgba(17, 24, 39, 0.60);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      min-height: 380px;
      max-height: 480px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      scroll-behavior: smooth;
    }

    /* Scrollbar styling */
    .chat-window::-webkit-scrollbar { width: 5px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 9px; }

    /* ── Individual messages ──────────────────────────── */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 0.2em;
      max-width: 82%;
      animation: fadeUp 0.22s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg--user { align-self: flex-end; align-items: flex-end; }
    .msg--bot  { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 0.65em 1em;
      border-radius: 14px;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .msg--user .msg-bubble {
      background: var(--accent);
      color: #0f172a;
      border-bottom-right-radius: 4px;
    }

    .msg--bot .msg-bubble {
      background: rgba(28, 60, 80, 0.90);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Poem lines styled differently */
    .msg--bot .msg-bubble.is-poem {
      background: rgba(45, 38, 75, 0.80);
      border-color: rgba(167, 139, 250, 0.30);
      font-style: italic;
      color: var(--violet-hover, #c4b5fd);
      white-space: pre-line;
    }

    .msg-label {
      font-size: 0.72rem;
      color: var(--subtle);
      padding: 0 0.25em;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0.65em 1em;
      background: rgba(28, 60, 80, 0.90);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
      40%           { opacity: 1;    transform: scale(1); }
    }

    /* ── Input row ────────────────────────────────────── */
    .chat-input-row {
      display: flex;
      gap: 0.6rem;
      align-items: stretch;
    }

    .chat-input-row input {
      flex: 1;
      padding: 0.7em 1em;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      background: rgba(17, 24, 39, 0.80);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      margin-bottom: 0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .chat-input-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 156, 246, 0.25);
      outline: none;
    }

    .chat-input-row input::placeholder { color: var(--subtle); }

    .chat-input-row button {
      padding: 0.7em 1.3em;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    /* ── Hint chips ───────────────────────────────────── */
    .hint-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chip {
      background: rgba(91, 156, 246, 0.10);
      border: 1px solid rgba(91, 156, 246, 0.25);
      color: var(--accent-hover);
      border-radius: 999px;
      padding: 0.25em 0.85em;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .chip:hover {
      background: rgba(91, 156, 246, 0.20);
      border-color: var(--accent-hover);
    }

    @media (max-width: 480px) {
      .chat-wrap { padding: var(--space-md) var(--space-sm); }
      .msg { max-width: 92%; }
    }
  </style>
</head>
<body>
  <header></header>

  <main id="main-content">
    <div class="chat-wrap">

      <div class="chat-header">
        <h1>Poetry <span style="color:var(--accent-hover)">Bot</span></h1>
        <p>Give me a word and I'll write you a poem. Or just say hello.</p>
      </div>

      <div class="chat-window" id="chatWindow" aria-live="polite" aria-label="Chat messages"></div>

      <div class="hint-chips" id="hintChips">
        <button class="chip" onclick="sendChip('Hello!')">Hello!</button>
        <button class="chip" onclick="sendChip('Write a poem about rain')">rain</button>
        <button class="chip" onclick="sendChip('Write a poem about stars')">stars</button>
        <button class="chip" onclick="sendChip('Write a poem about time')">time</button>
        <button class="chip" onclick="sendChip('You\'re amazing!')">compliment</button>
      </div>

      <div class="chat-input-row">
        <input
          type="text"
          id="chatInput"
          placeholder="Say hello, or type a word for a poem…"
          aria-label="Chat message"
          autocomplete="off"
          maxlength="80"
        >
        <button onclick="handleSend()" aria-label="Send message">Send</button>
      </div>

    </div>
  </main>

  <script src="nav.js"></script>
  <script>
  (function () {

    /* ── Poem templates ────────────────────────────────────
       Each template is a function that receives the word
       and returns a 5-line poem string.
    ──────────────────────────────────────────────────────── */
    const poemTemplates = [
      w => `In the quiet of the ${w},
A whisper finds its way,
The ${w} blooms like morning light,
It dances, will not stay,
Still, the ${w} shapes the day.`,

      w => `A single ${w} holds a world,
Beneath the fading sun,
The ${w} speaks in silences,
Its story not yet done,
In the end, the ${w} has won.`,

      w => `There is a place called ${w},
Where wandering thoughts go free,
The ${w} asks no questions here,
It simply lets you be,
A shelter shaped like ${w} for me.`,

      w => `Oh ${w}, you curious thing,
You linger without reason,
The ${w} arrives like seasons do,
No matter rain or sun,
We'll always greet the ${w} again.`,

      w => `I found a ${w} yesterday,
Tucked inside a dream,
The ${w} shimmered, soft and strange,
Not quite what it would seem,
A ${w} is more than it may seem.`,

      w => `The ${w} rises, soft and slow,
Beneath a violet sky,
I reach toward the ${w} and find
It teaches me to try,
The ${w} will never say goodbye.`,

      w => `When all the world grows still and cold,
The ${w} remains,
Woven into memory,
It weathers winds and rains,
The ${w} in everything that stays.`,
    ];

    /* ── Greetings ────────────────────────────────────── */
    const greetingTriggers = ["hello", "hi", "hey", "howdy", "greetings", "good morning", "good evening", "good afternoon", "sup", "what's up", "hiya"];

    const greetingReplies = [
      "Hello! Give me a word and I'll spin it into a poem for you.",
      "Hey there! I'm ready to versify — just drop a word.",
      "Hi! I live for words. Toss one my way and I'll make it rhyme.",
      "Greetings! Type any word and watch it become a five-line poem.",
      "Hello, hello! What word shall we turn into poetry today?",
    ];

    /* ── Compliments ──────────────────────────────────── */
    const complimentTriggers = ["amazing", "awesome", "great", "good job", "well done", "brilliant", "wonderful", "love you", "you're the best", "fantastic", "incredible", "nice", "beautiful", "smart", "clever", "thank", "thanks", "ty"];

    const complimentReplies = [
      "Aw, you're far too kind — but I won't argue. Now, give me a word to poeticize!",
      "That warms my algorithmic heart. Want a poem to celebrate?",
      "Flattery will get you everywhere — and a free five-line poem. Just say the word!",
      "You're making me blush in hexadecimal. Shall I write you something beautiful in return?",
      "Thank you! I promise to channel that good energy into your next poem.",
    ];

    /* ── Poem request detection ───────────────────────── */
    function extractPoemWord(input) {
      // Patterns: "poem about X", "write X", "make a poem about X", or bare single word
      const patterns = [
        /poem\s+(?:about\s+)?(.+)/i,
        /write\s+(?:a\s+poem\s+(?:about\s+)?)?(.+)/i,
        /make\s+(?:a\s+poem\s+(?:about\s+)?)?(.+)/i,
        /verse\s+(?:about\s+)?(.+)/i,
        /rhyme\s+(?:about\s+)?(.+)/i,
      ];
      for (const re of patterns) {
        const m = input.match(re);
        if (m) return m[1].trim().replace(/[^a-zA-Z\s]/g, "").trim().split(/\s+/)[0];
      }
      // Single word input — treat it as the poem subject
      const cleaned = input.trim().replace(/[^a-zA-Z]/g, "");
      if (cleaned && input.trim().split(/\s+/).length === 1) return cleaned;
      return null;
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function matchesTrigger(input, triggers) {
      const lower = input.toLowerCase();
      return triggers.some(t => lower.includes(t));
    }

    /* ── Bot reply logic ──────────────────────────────── */
    function getBotReply(userInput) {
      const trimmed = userInput.trim();
      if (!trimmed) return { text: "I didn't catch that — try a word or a greeting!", isPoem: false };

      // Greeting
      if (matchesTrigger(trimmed, greetingTriggers)) {
        return { text: pickRandom(greetingReplies), isPoem: false };
      }

      // Compliment
      if (matchesTrigger(trimmed, complimentTriggers)) {
        return { text: pickRandom(complimentReplies), isPoem: false };
      }

      // Poem request
      const word = extractPoemWord(trimmed);
      if (word) {
        const poem = pickRandom(poemTemplates)(word.toLowerCase());
        return { text: poem, isPoem: true };
      }

      // Fallback
      return {
        text: `Hmm, I'm not sure what to do with "${trimmed}". Try typing a single word and I'll write a poem about it!`,
        isPoem: false,
      };
    }

    /* ── DOM helpers ──────────────────────────────────── */
    const chatWindow = document.getElementById("chatWindow");
    const chatInput  = document.getElementById("chatInput");

    function addMessage(text, role, isPoem) {
      const wrap = document.createElement("div");
      wrap.className = `msg msg--${role}`;

      const label = document.createElement("span");
      label.className = "msg-label";
      label.textContent = role === "user" ? "You" : "Poetry Bot";

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble" + (isPoem ? " is-poem" : "");
      bubble.textContent = text;

      wrap.appendChild(label);
      wrap.appendChild(bubble);
      chatWindow.appendChild(wrap);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addTypingIndicator() {
      const wrap = document.createElement("div");
      wrap.className = "msg msg--bot";
      wrap.id = "typingIndicator";

      const label = document.createElement("span");
      label.className = "msg-label";
      label.textContent = "Poetry Bot";

      const indicator = document.createElement("div");
      indicator.className = "typing-indicator";
      indicator.innerHTML = "<span></span><span></span><span></span>";

      wrap.appendChild(label);
      wrap.appendChild(indicator);
      chatWindow.appendChild(wrap);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById("typingIndicator");
      if (el) el.remove();
    }

    /* ── Send flow ────────────────────────────────────── */
    function handleSend() {
      const value = chatInput.value.trim();
      if (!value) return;

      addMessage(value, "user", false);
      chatInput.value = "";

      addTypingIndicator();

      // Simulate a short thinking delay
      const delay = 600 + Math.random() * 600;
      setTimeout(function () {
        removeTypingIndicator();
        const reply = getBotReply(value);
        addMessage(reply.text, "bot", reply.isPoem);
      }, delay);
    }

    // Send on Enter key
    chatInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") handleSend();
    });

    // Chip helper (called from inline onclick)
    window.sendChip = function (text) {
      chatInput.value = text;
      handleSend();
    };

    // Opening greeting from bot
    setTimeout(function () {
      addMessage("Hello! I'm your Poetry Bot. Type any word and I'll write you a five-line poem. Or just say hi!", "bot", false);
    }, 400);

  })();
  </script>
</body>
</html>
