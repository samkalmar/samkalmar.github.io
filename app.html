<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S. Kalmar | JO App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="logo">SK</div>
  
<h1>Job Orientation Analyzer</h1>

<input type="text" id="jobInput" placeholder="Enter Job Title or O*NET Code" />
<br>
<button onclick="analyzeJob()">Analyze</button>

<div class="result" id="output"></div>
<div id="matches"></div>
<canvas id="chart"></canvas>

<script>
let workbookData = {};
let chart;

// Preload dataset
fetch('Objective Work Activities.xlsx')
  .then(res => res.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(new Uint8Array(data), { type: 'array' });
    workbook.SheetNames.forEach(name => {
      workbookData[name] = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
    });
    console.log('Dataset loaded');
  });

// Levenshtein distance
function levenshtein(a, b) {
  const matrix = Array.from({ length: b.length + 1 }, () => []);
  for (let i = 0; i <= b.length; i++) matrix[i][0] = i;
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }
  return matrix[b.length][a.length];
}

// Find similar job titles
function findSimilarJobs(query) {
  let titles = new Set();

  Object.values(workbookData).forEach(sheet => {
    sheet.forEach(row => {
      if (row['Title']) titles.add(row['Title']);
    });
  });

  let scored = Array.from(titles).map(title => {
    return {
      title,
      score: levenshtein(query, title.toLowerCase())
    };
  });

  scored.sort((a,b) => a.score - b.score);
  return scored.slice(0, 5); // top 5 matches
}

function getRawScore(sheetNames, jobTitle) {
  let scores = [];

  sheetNames.forEach(sheet => {
    (workbookData[sheet] || []).forEach(row => {
      if (row['Title'] === jobTitle) {
        const importance = parseFloat(row['Importance']) || 0;
        const level = parseFloat(row['Level']) || 0;
        scores.push(importance * level);
      }
    });
  });

  return scores;
}

function normalize(scores) {
  if (scores.length === 0) return 0;
  const min = Math.min(...scores);
  const max = Math.max(...scores);
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  if (max === min) return 0.5;
  return (avg - min) / (max - min);
}

function analyzeJob() {
  const query = document.getElementById('jobInput').value.toLowerCase();

  const agenticSheets = ['A1','A2','A3','A4','A5','A6','A7'];
  const communalSheets = ['C1','C2','C3','C4','C5'];

  const matches = findSimilarJobs(query);

  let outputHTML = '<h3>Closest Matches</h3>';

  matches.forEach(match => {
    const agenticRaw = getRawScore(agenticSheets, match.title);
    const communalRaw = getRawScore(communalSheets, match.title);

    const agenticScore = normalize(agenticRaw);
    const communalScore = normalize(communalRaw);

    outputHTML += `<p><strong>${match.title}</strong>: A=${agenticScore.toFixed(2)}, C=${communalScore.toFixed(2)}</p>`;
  });

  document.getElementById('matches').innerHTML = outputHTML;

  // Use best match for main result + chart
  if (matches.length > 0) {
    const best = matches[0].title;

    const agenticRaw = getRawScore(agenticSheets, best);
    const communalRaw = getRawScore(communalSheets, best);

    const agenticScore = normalize(agenticRaw);
    const communalScore = normalize(communalRaw);

    let result = '';
    if (agenticScore > communalScore) result = 'More Agentic';
    else if (communalScore > agenticScore) result = 'More Communal';
    else result = 'Balanced';

    document.getElementById('output').innerText =
      `${result} (${best}) | A: ${agenticScore.toFixed(2)} vs C: ${communalScore.toFixed(2)}`;

    renderChart(agenticScore, communalScore);
  }
}

function renderChart(agentic, communal) {
  const ctx = document.getElementById('chart');

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Agentic', 'Communal'],
      datasets: [{
        label: 'Normalized Score',
        data: [agentic, communal]
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true,
          max: 1
        }
      }
    }
  });
}
</script>

</body>
</html>
