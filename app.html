<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S. Kalmar | JO App</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="experience.html">Experience</a>
    <a href="contact.html">Contact</a>
    <a href="app.html">JO App</a>
  </nav>
  <div class="logo">SK</div>
</header>

<section>
<h1>Job Orientation Analyzer</h1>

<input type="text" id="jobInput" placeholder="Enter Job Title or O*NET Code">
<button onclick="analyzeJob()">Analyze</button>

<div class="result" id="output"></div>
<div id="matches"></div>
<canvas id="chart"></canvas>
</section>

<script>
let workbookData = {};
let chart;
let dataLoaded = false;

// 🔥 IMPORTANT: rename file to remove spaces OR update path
const FILE_PATH = "Objective_Work_Activities.xlsx";

// Load dataset
fetch(FILE_PATH)
  .then(res => {
    if (!res.ok) throw new Error("File not found");
    return res.arrayBuffer();
  })
  .then(data => {
    const workbook = XLSX.read(new Uint8Array(data), { type: 'array' });

    workbook.SheetNames.forEach(name => {
      workbookData[name] = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
    });

    dataLoaded = true;
    console.log("Dataset loaded:", Object.keys(workbookData));
  })
  .catch(err => {
    console.error("ERROR LOADING EXCEL:", err);
    alert("Dataset failed to load. Check file name/path.");
  });


// Levenshtein
function levenshtein(a, b) {
  const matrix = Array.from({ length: b.length + 1 }, () => []);
  for (let i = 0; i <= b.length; i++) matrix[i][0] = i;
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      matrix[i][j] = b[i-1] === a[j-1]
        ? matrix[i-1][j-1]
        : Math.min(matrix[i-1][j-1]+1, matrix[i][j-1]+1, matrix[i-1][j]+1);
    }
  }
  return matrix[b.length][a.length];
}

// Find similar titles
function findSimilarJobs(query) {
  let titles = new Set();

  Object.values(workbookData).forEach(sheet => {
    sheet.forEach(row => {
      if (row['Title']) titles.add(row['Title']);
    });
  });

  return Array.from(titles)
    .map(title => ({
      title,
      score: levenshtein(query, title.toLowerCase())
    }))
    .sort((a,b) => a.score - b.score)
    .slice(0,5);
}

// Score calc
function getRawScore(sheetNames, jobTitle) {
  let scores = [];

  sheetNames.forEach(sheet => {
    (workbookData[sheet] || []).forEach(row => {
      if (row['Title'] === jobTitle) {
        const i = parseFloat(row['Importance']) || 0;
        const l = parseFloat(row['Level']) || 0;
        scores.push(i * l);
      }
    });
  });

  return scores;
}

function normalize(scores) {
  if (!scores.length) return 0;
  const min = Math.min(...scores);
  const max = Math.max(...scores);
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;

  return max === min ? 0.5 : (avg - min)/(max - min);
}

// Main
function analyzeJob() {

  if (!dataLoaded) {
    alert("Dataset still loading — try again in a second.");
    return;
  }

  const query = document.getElementById('jobInput').value.toLowerCase();

  const agenticSheets = ['A1','A2','A3','A4','A5','A6','A7'];
  const communalSheets = ['C1','C2','C3','C4','C5'];

  const matches = findSimilarJobs(query);

  let html = "<h3>Closest Matches</h3>";

  matches.forEach(m => {
    const a = normalize(getRawScore(agenticSheets, m.title));
    const c = normalize(getRawScore(communalSheets, m.title));

    html += `<p><strong>${m.title}</strong>: A=${a.toFixed(2)}, C=${c.toFixed(2)}</p>`;
  });

  document.getElementById("matches").innerHTML = html;

  if (matches.length) {
    const best = matches[0].title;

    const a = normalize(getRawScore(agenticSheets, best));
    const c = normalize(getRawScore(communalSheets, best));

    const label = a > c ? "More Agentic" : c > a ? "More Communal" : "Balanced";

    document.getElementById("output").innerText =
      `${label} (${best}) | A: ${a.toFixed(2)} vs C: ${c.toFixed(2)}`;

    renderChart(a, c);
  }
}

// Chart
function renderChart(a, c) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Agentic","Communal"],
      datasets: [{ label:"Score", data:[a,c] }]
    },
    options: {
      scales: { y: { beginAtZero:true, max:1 } }
    }
  });
}
</script>

</body>
</html>
